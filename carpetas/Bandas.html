<!DOCTYPE html>
<html lang="es">

    <title>Bandas Favoritas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            background-color: #f4ecf7;
            color: #333;
        }
        h1 { color: #6c3483; }
        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }
        ul li {
            background-color: #d7bde2;
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1.1em;
            border-left: 5px solid #6c3483;
        }
        ul li:hover {
            background-color: #c39bd3;
        }
        a {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #fff;
            background-color: #6c3483;
            padding: 8px 16px;
            border-radius: 6px;
        }
        a:hover { background-color: #4a235a; }
    </style>
</head>
